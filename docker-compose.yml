services:
  api:
    build:
      context: .
      target: api
    # ports:
    #   - "3001:3001"  # uncomment for direct API access (debugging)
    volumes:
      - ./books:/app/books
      - ./prompts:/app/prompts
      - ./templates:/app/templates:ro
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - PROJECT_ROOT=/app
      - BOOKS_DIR=/app/books
      - PROMPTS_DIR=/app/prompts
      - TEMPLATES_DIR=/app/templates
      - CONFIG_PATH=/app/config.yaml
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  studio:
    build:
      context: .
      target: studio
    ports:
      - "${PORT:-8080}:80"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge
