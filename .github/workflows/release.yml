name: Release

on:
  push:
    branches: [deploy]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history for version tag detection

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Determine next version
        id: version
        shell: bash
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            VERSION="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEXT="$MAJOR.$MINOR.$PATCH"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          BODY=$(printf "## What's Changed\n\n%s\n\n---\n**Windows:** Download the installer (.exe) below.\n\n**Docker** (no install needed):\n\`\`\`\ndocker run -p 8080:80 -v ./books:/app/books ghcr.io/unicef/adt-studio:$NEXT\n\`\`\`" "$LOG")
          # Multiline output using delimiter
          echo "body<<RELEASE_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "RELEASE_EOF" >> "$GITHUB_OUTPUT"

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'apps/desktop/src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(p, 'utf-8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          "

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "ADT Studio ${{ steps.version.outputs.tag }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: app
          push: true
          tags: |
            ghcr.io/unicef/adt-studio:latest
            ghcr.io/unicef/adt-studio:${{ needs.release.outputs.tag }}

      - name: Generate standalone docker-compose.yml
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          cat > docker-compose.yml << EOF
          # ADT Studio $TAG
          # Usage:  docker compose up
          # Open:   http://localhost:8080
          # Books persist in ./books/
          services:
            adt-studio:
              image: ghcr.io/unicef/adt-studio:${TAG}
              ports:
                - "\${PORT:-8080}:80"
              volumes:
                - ./books:/app/books
              restart: unless-stopped
          EOF

      - name: Upload docker-compose.yml to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release.outputs.tag }} docker-compose.yml \
            --repo ${{ github.repository }} \
            --clobber
