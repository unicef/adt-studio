name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'apps/desktop/src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(p, 'utf-8'));
            conf.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + '\n');
          "

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "ADT Studio ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: false

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          NOTES=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} \
            --jq '.body')
          gh release edit ${{ github.ref_name }} --notes "$NOTES"
