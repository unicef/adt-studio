text_types:
  book_title: Main title of the book
  book_subtitle: Subtitle of the book
  book_author: Author name(s)
  book_metadata: Publisher, copyright, ISBN, edition info
  section_heading: Chapter or section headings
  section_text: Main body/narrative text
  instruction_text: Instructions for activities or exercises
  activity_number: Numbering for activities/exercises (e.g., "1.", "A)")
  activity_title: Title of an activity or exercise
  activity_option: Multiple choice or selectable options
  activity_input_placeholder_text: Placeholder text in input fields
  fill_in_the_blank: Text with blanks to fill in (use ___ for blanks)
  image_associated_text: Captions, labels, or descriptions tied to images
  image_overlay: Text overlaid directly on images
  math: Mathematical expressions (use LaTeX notation)
  standalone_text: Text that doesn't fit other categories
  header_text: Running headers
  footer_text: Running footers
  page_number: Page numbers
  other: Any text not covered above

text_group_types:
  heading: A heading or title block
  paragraph: A block of continuous prose
  stanza: A verse or stanza of poetry
  list: A list of items (ordered or unordered)
  table: A data table with rows and columns
  other: Anything that doesn't fit the above

section_types:
  front_cover: Front cover page (first page only)
  inside_cover: Inside cover page
  back_cover: Back cover page (last page only)
  separator: Separator page between logical sections
  credits: Credits and acknowledgements
  foreword: Introduction, overview, or author's note
  table_of_contents: Table of contents
  boxed_text: Text in a box or callout
  text_only: Reading section with only text
  text_and_single_image: Section with text and a single image
  text_and_images: Reading section with text and multiple images
  images_only: Section with only images
  activity_matching: >
    Matching activity — STRICTLY two parallel lists of EQUAL length where each item from
    one side connects to exactly one item on the other side. Every item has exactly one
    unique match (1-to-1 pairing). If items can go into categories with varying counts,
    or if items are being sorted/grouped, this is sorting, NOT matching.
  activity_fill_in_a_table: >
    Table fill-in activity — students complete cells in a table or grid.
  activity_multiple_choice: >
    Multiple choice activity — each question or prompt presents several answer options
    and the student picks ONE correct answer. Options may appear as buttons, radio buttons,
    or labeled choices next to a passage or question. If the page has passages on one side
    and answer choices on the other, but each passage has its OWN set of options to choose
    from, this is multiple choice, NOT matching.
  activity_true_false: >
    True or false activity — students decide whether each statement is true or false.
  activity_open_ended_answer: >
    Open-ended text response activity — students write free-form answers.
  activity_fill_in_the_blank: >
    Fill in the blank activity — students complete sentences by filling in missing words.
  activity_sorting: >
    Sorting activity — students arrange or categorize items into groups, categories, or a
    specific order. Categories may have any number of items (not necessarily equal). If in
    doubt between matching and sorting, prefer sorting.
  other: Any other section type

metadata:
  prompt: metadata_extraction
  model: openai:gpt-5.2

text_classification:
  prompt: text_classification
  model: openai:gpt-5.2

image_meaningfulness:
  prompt: image_meaningfulness
  model: openai:gpt-5.2

image_cropping:
  prompt: image_cropping
  model: openai:gpt-5.2

page_sectioning:
  prompt: page_sectioning
  model: openai:gpt-5.2

default_render_strategy: two_column

render_strategies:
  llm:
    render_type: llm
    config:
      prompt: web_generation_html
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  llm-overlay:
    render_type: llm
    config:
      prompt: web_generation_html_overlay
      model: openai:gpt-5.2
      max_retries: 25
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  two_column:
    render_type: template
    config:
      template: two_column_render
  two_column_story:
    render_type: template
    config:
      template: two_column_story
  activity_multiple_choice:
    render_type: activity
    config:
      prompt: activity_multiple_choice
      answer_prompt: activity_multiple_choice_answers
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  activity_true_false:
    render_type: activity
    config:
      prompt: activity_true_false
      answer_prompt: activity_true_false_answers
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  activity_fill_in_the_blank:
    render_type: activity
    config:
      prompt: activity_fill_in_the_blank
      answer_prompt: activity_fill_in_the_blank_answers
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  activity_fill_in_a_table:
    render_type: activity
    config:
      prompt: activity_fill_in_a_table
      answer_prompt: activity_fill_in_a_table_answers
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  activity_matching:
    render_type: activity
    config:
      prompt: activity_matching
      answer_prompt: activity_matching_answers
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  activity_sorting:
    render_type: activity
    config:
      prompt: activity_sorting
      answer_prompt: activity_sorting_answers
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  activity_open_ended_answer:
    render_type: activity
    config:
      prompt: activity_open_ended_answer
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5
  # Unified image-first activity renderer — determines activity structure from the page image
  # rather than relying on a pre-assigned type to select a type-specific prompt.
  activity_from_image:
    render_type: activity
    config:
      prompt: activity_from_image
      model: openai:gpt-5.2
      max_retries: 5
      timeout: 180
      visual_refinement:
        enabled: true
        max_iterations: 5

section_render_strategies:
  activity_multiple_choice: activity_from_image
  activity_true_false: activity_from_image
  activity_fill_in_the_blank: activity_from_image
  activity_fill_in_a_table: activity_from_image
  activity_matching: activity_from_image
  activity_sorting: activity_from_image
  activity_open_ended_answer: activity_from_image

quiz_generation:
  quiz_section_types:
    - boxed_text
    - text_only
    - text_and_single_image
    - text_and_images
    - images_only

pruned_text_types:
  - header_text
  - footer_text
  - page_number

pruned_section_types:
  - back_cover
  - credits
  - inside_cover

concurrency: 32

image_filters:
  min_side: 100
  max_side: 5000
  min_stddev: 2
  meaningfulness: true
  cropping: true

# rate_limit:
#   requests_per_minute: 60
