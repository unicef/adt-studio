# Reference preset — Novel with Images
# Template-driven rendering, spread pages, no activities, no quizzes
# Based on adt-press "novel_with_images" preset

default_render_strategy: two_column

spread_mode: false

page_sectioning:
  mode: page

render_strategies:
  two_column:
    render_type: template
    config:
      template: two_column_render
  llm:
    render_type: llm
    config:
      prompt: web_generation_html
      model: openai:gpt-5.2
      max_retries: 25
      timeout: 180

section_render_strategies: {}

pruned_text_types:
  - header_text
  - footer_text
  - page_number

pruned_section_types:
  - back_cover
  - credits
  - inside_cover
  - activity_multiple_choice
  - activity_true_false
  - activity_fill_in_the_blank
  - activity_fill_in_a_table
  - activity_matching
  - activity_sorting
  - activity_open_ended_answer

image_filters:
  min_side: 100
  max_side: 5000
  min_stddev: 2
